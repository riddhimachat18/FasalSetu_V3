version: "3.9"

services:
  fasalsetu:
    build: .
    container_name: fasalsetu_api
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-}   # optional
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      # Persist models, ChromaDB and logs outside container
      - ./models:/app/models
      - ./data:/app/data
      - ./logs:/app/logs
      - ./data/schemes:/app/data/schemes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Optional: simple nginx reverse proxy for demo
  # nginx:
